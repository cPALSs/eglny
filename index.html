<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S6SFT9M0ME"></script>
  <script src="analytics.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Elk Grove Lunar New Year Tết — 2027 planning, director recruitment, and sponsorship at Elk Grove Park." />
  <title>Elk Grove Lunar New Year Tết</title>
  <script src="clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("eglny-theme");
        if (t === "light" || t === "dark" || t === "auto") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap" id="main">
    <p class="muted">Loading…</p>
  </main>
  <div id="site-footer"></div>
  <script src="doc-scroll.js"></script>
  <script src="site.js"></script>
  <script>
    (async function () {
      const { initPageShell, loadSiteData, mountFooter, renderEventSummary, setPageTitle, escapeHtml } = window.EglnySite;
      initPageShell("home");
      try {
        const site = await loadSiteData();
        setPageTitle(site);
        const e = site.event;
        const h = site.hero;
        const c = site.cta;
        document.getElementById("main").innerHTML = `
          <section class="hero">
            <h1>${escapeHtml(e.name)}</h1>
            ${renderEventSummary(site)}
          </section>
          <p class="home-intro">${escapeHtml(h.intro)}</p>
          <section class="content-section">
            <h2>${escapeHtml(h.headline)}</h2>
            <p>${escapeHtml(h.subhead)}</p>
            <p class="muted">${escapeHtml(h.body)}</p>
            <div class="cta-row">
              <a class="btn btn-primary" href="${escapeHtml(c.primaryHref)}">${escapeHtml(c.primaryLabel)}</a>
              <a class="btn btn-secondary" href="${escapeHtml(c.sponsorsHref)}">${escapeHtml(c.sponsorsLabel)}</a>
            </div>
          </section>
          <section class="content-section">
            <h2>Fund the experience</h2>
            <p>Vendor fees fund baseline operations. Sponsors unlock the blocks families remember — stages, Tết Relay Cup, children's programming, and more.</p>
            <div class="cta-row">
              <a class="btn btn-primary" href="${escapeHtml(c.buildHref)}">${escapeHtml(c.buildLabel)}</a>
            </div>
          </section>
        `;
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
