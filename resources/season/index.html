<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S6SFT9M0ME"></script>
  <script src="../../analytics.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Lunar New Year Season in Greater Sacramento — late January through early March events, including Elk Grove Lunar New Year Tết." />
  <title>Lunar New Year Season — Elk Grove Lunar New Year Tết</title>
  <script src="../../clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("eglny-theme");
        if (t === "light" || t === "dark" || t === "auto") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="../../site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap page-wrap--doc" id="main">
    <p class="muted">Loading…</p>
  </main>
  <div id="site-footer"></div>
  <script src="../../doc-scroll.js"></script>
  <script src="../../site.js"></script>
  <script>
    (async function () {
      const {
        initPageShell,
        loadSiteData,
        loadSeasonEvents,
        mountFooter,
        renderSeasonPage,
        initDocToc,
        setPageTitle,
        escapeHtml,
      } = window.EglnySite;
      initPageShell("season");
      try {
        const [site, seasonData] = await Promise.all([loadSiteData(), loadSeasonEvents()]);
        setPageTitle(site, "Lunar New Year Season");
        document.getElementById("main").innerHTML = renderSeasonPage(site.season, seasonData);
        initDocToc();
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
