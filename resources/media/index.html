<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Elk Grove Lunar New Year Tết media — press coverage, ads, and festival videos." />
  <title>Media — Elk Grove Lunar New Year Tết</title>
  <script src="../../clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("eglny-theme");
        if (t === "light" || t === "dark" || t === "auto") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="../../site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap page-wrap--doc" id="main">
    <p class="muted">Loading…</p>
  </main>
  <div id="site-footer"></div>
  <script src="../../site.js"></script>
  <script>
    (async function () {
      const { initPageShell, loadSiteData, mountFooter, renderMediaPage, setPageTitle, escapeHtml } =
        window.EglnySite;
      initPageShell("media");
      try {
        const site = await loadSiteData();
        setPageTitle(site, "Media");
        document.getElementById("main").innerHTML = renderMediaPage(site.media);
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
